services:
  dev2-chat:
    build: .
    container_name: dev2-chat
    ports:
      - "127.0.0.1:8085:8080"
    env_file: .env
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-dev2}@mongodb:27017/${MONGO_DATABASE:-dev2knowledge}?authSource=${MONGO_AUTH_SOURCE:-admin}
      NATS_URL: nats://nats:4223
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CHAT_LEGACY_ACTIVE_TRANSPORT_ENABLED: ${CHAT_LEGACY_ACTIVE_TRANSPORT_ENABLED:-false}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_AUDIENCE: ${AUTHENTIK_AUDIENCE:-}
      CHAT_ALLOWED_ORIGINS: ${CHAT_ALLOWED_ORIGINS:-https://dev2.solutions}
      CHAT_SOCKET_ALLOWED_ORIGINS: ${CHAT_SOCKET_ALLOWED_ORIGINS:-https://dev2.solutions}
      CHAT_SOCKET_TRUSTED_PROXY_CIDRS: ${CHAT_SOCKET_TRUSTED_PROXY_CIDRS:-}
      CHAT_SOCKET_REQUIRE_TRUSTED_PROXY: ${CHAT_SOCKET_REQUIRE_TRUSTED_PROXY:-true}
      CHAT_SOCKET_GENERATIONS_GLOBAL: ${CHAT_SOCKET_GENERATIONS_GLOBAL:-100}
    networks:
      - dev2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dev2-network:
    external: true
